name: Deploy Docs (Prod)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-docs-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  # These values come from Terraform outputs — update after first `terragrunt apply`
  S3_BUCKET: prima-delivery-docs-site-prod
  CLOUDFRONT_DISTRIBUTION_ID: PLACEHOLDER
  AWS_ROLE_ARN: PLACEHOLDER

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://alvisprima.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Generate documentation
        working-directory: docs-site
        run: npm run generate

      - name: Build website
        working-directory: docs-site
        env:
          DOCUSAURUS_URL: https://alvisprima.com
          DOCUSAURUS_BASE_URL: /
          DEPLOY_ENV: prod
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync docs-site/build/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json" \
            --exclude "sitemap.xml"
          # HTML and data files get short cache
          aws s3 sync docs-site/build/ s3://${{ env.S3_BUCKET }}/ \
            --cache-control "public, max-age=300" \
            --include "index.html" \
            --include "*.json" \
            --include "sitemap.xml"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
