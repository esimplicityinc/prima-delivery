name: Deploy Docs (Prod)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-docs-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  S3_BUCKET: prima-delivery-docs-site-prod
  # Update these after running: ENV=prod just iac-terragrunt-apply
  CLOUDFRONT_DISTRIBUTION_ID: PLACEHOLDER
  AWS_ROLE_ARN: PLACEHOLDER

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      # TODO: Add terragrunt apply step for prod infra here
      # For now, prod infra is deployed manually before first release
      - name: Placeholder for infra deployment
        run: echo "Prod infrastructure should be deployed before first release"

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment:
      name: production
      url: https://delivery.alvisprima.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Generate documentation
        working-directory: docs-site
        run: npm run generate

      - name: Build website
        working-directory: docs-site
        env:
          DOCUSAURUS_URL: https://delivery.alvisprima.com
          DOCUSAURUS_BASE_URL: /
          DEPLOY_ENV: prod
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          # Immutable assets (JS, CSS, images) get long cache
          aws s3 sync docs-site/build/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "sitemap.xml" \
            --exclude "robots.txt"
          # HTML and metadata files get moderate cache for prod
          aws s3 sync docs-site/build/ s3://${{ env.S3_BUCKET }}/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "sitemap.xml" \
            --include "robots.txt" \
            --size-only

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
