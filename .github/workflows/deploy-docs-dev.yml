name: Deploy Docs (Dev)

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.opencode/**'
      - 'docs/**'
      - 'plugins/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-docs-dev
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  S3_BUCKET: prima-delivery-docs-site-dev
  CLOUDFRONT_DISTRIBUTION_ID: EXE2QYNRPB2ID
  AWS_ROLE_ARN: arn:aws:iam::591639515130:role/prima-docs-site-dev-gh-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://delivery.dev.alvisprima.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Generate documentation
        working-directory: docs-site
        run: npm run generate

      - name: Build website
        working-directory: docs-site
        env:
          DOCUSAURUS_URL: https://delivery.dev.alvisprima.com
          DOCUSAURUS_BASE_URL: /
          DEPLOY_ENV: dev
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          # Immutable assets (JS, CSS, images) get long cache
          aws s3 sync docs-site/build/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "sitemap.xml" \
            --exclude "robots.txt"
          # HTML and metadata files get no-cache for instant updates
          aws s3 sync docs-site/build/ s3://${{ env.S3_BUCKET }}/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "sitemap.xml" \
            --include "robots.txt" \
            --size-only

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
