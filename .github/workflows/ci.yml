name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate skills
        run: bun run validate

  build-openpackage:
    name: Build OpenPackage
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install OpenPackage CLI
        run: npm install -g opkg

      - name: Generate OpenPackage manifests
        run: bun run build:openpackage

      - name: Validate root manifest
        run: |
          if [ ! -f "openpackage.yml" ]; then
            echo "ERROR: Root openpackage.yml not found"
            exit 1
          fi
          echo "Root manifest OK"

      - name: Validate plugin manifests
        run: |
          MISSING=0
          for dir in plugins/*/; do
            if [ ! -f "${dir}openpackage.yml" ]; then
              echo "WARNING: Missing manifest in ${dir}"
              MISSING=$((MISSING + 1))
            fi
          done
          TOTAL=$(ls -d plugins/*/ | wc -l | tr -d ' ')
          echo "Checked ${TOTAL} plugins — ${MISSING} missing manifests"

      - name: Upload manifests
        uses: actions/upload-artifact@v4
        with:
          name: openpackage-manifests
          path: |
            openpackage.yml
            plugins/*/openpackage.yml
            PLUGINS.md
          retention-days: 7

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Generate documentation
        working-directory: docs-site
        run: npm run generate

      - name: Build website
        working-directory: docs-site
        run: npm run build
