name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install OpenPackage CLI
        run: npm install -g opkg

      - name: Build OpenPackage manifests
        run: bun run build:openpackage

      - name: Generate changelog
        id: changelog
        run: |
          bunx changelogen --output RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Package plugin manifests
        run: tar czf openpackage-manifests.tar.gz openpackage.yml plugins/*/openpackage.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            openpackage.yml
            openpackage-manifests.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
