apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: {{ layer_name }}
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
commonLabels:
  app.kubernetes.io/part-of: {{ system_name }}
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/component: {{ layer_name }}
