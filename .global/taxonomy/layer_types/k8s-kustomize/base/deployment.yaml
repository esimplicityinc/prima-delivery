apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ layer_name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ layer_name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ layer_name }}
    spec:
      containers:
        - name: {{ layer_name }}
          image: nginx:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: {{ primary_environment }}
