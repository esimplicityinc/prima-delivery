apiVersion: katalyst.taxonomy/v1alpha
kind: TaxonomyNode
metadata:
  name: {{ layer_name }}
taxonomyNodeType: layer
spec:
  description: {{ description }}
  environments:
    - {{ primary_environment }}
  dependsOn:
    nodes:
      - self.app
  type: kubernetes
  layerType: k8s-argocd
  parents:
    node: {{ parent_stack }}
  owners:
    - {{ owner_email }}
