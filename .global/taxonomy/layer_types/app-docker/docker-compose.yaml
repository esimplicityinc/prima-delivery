# Docker Compose for local development
# Layer: {{ system_name }}/{{ stack_name }}/{{ layer_name }}

services:
  "{{ layer_name }}":
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: "{{ layer_name }}:local"
    container_name: "{{ layer_name }}"
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    env_file:
      - .env
    volumes:
      # Mount source for hot reload in development
      - ./src:/app/src:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - "{{ layer_name }}-network"

networks:
  "{{ layer_name }}-network":
    driver: bridge
