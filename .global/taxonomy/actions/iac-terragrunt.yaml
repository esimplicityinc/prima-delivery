apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
kind: Action
metadata:
  name: iac-terragrunt-plan
  labels:
    layerType: iac-terragrunt
spec:
  description: Run terragrunt plan for the infrastructure layer.
  type: shell
  when: pre
  run: just iac-terragrunt-plan
  timeoutSeconds: 600
  tags:
    - plan
    - preview
    - terragrunt
---
apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
kind: Action
metadata:
  name: iac-terragrunt-apply
  labels:
    layerType: iac-terragrunt
spec:
  description: Apply terragrunt-managed infrastructure changes.
  type: shell
  when: main
  run: just iac-terragrunt-apply
  timeoutSeconds: 1800
  tags:
    - apply
    - deploy
    - terragrunt
---
apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
