apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
kind: Action
metadata:
  name: k8s-kustomize-build
  labels:
    layerType: k8s-kustomize
spec:
  description: Render Kustomize manifests for the target environment.
  type: shell
  when: pre
  run: just k8s-kustomize-build
  tags:
    - build
    - render
    - kustomize
---
apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
kind: Action
metadata:
  name: k8s-kustomize-apply
  labels:
    layerType: k8s-kustomize
spec:
  description: Apply rendered Kustomize manifests to the cluster.
  type: shell
  when: main
  run: just k8s-kustomize-apply
  timeoutSeconds: 300
  tags:
    - apply
    - deploy
    - kubernetes
---
apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
kind: Action
metadata:
  name: k8s-kustomize-delete
  labels:
    layerType: k8s-kustomize
spec:
  description: Delete Kustomize-managed resources from the cluster.
  type: shell
  when: main
  run: just k8s-kustomize-delete
  timeoutSeconds: 300
  tags:
    - delete
    - teardown
    - kubernetes
---
apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
kind: Action
metadata:
  name: k8s-kustomize-diff
  labels:
