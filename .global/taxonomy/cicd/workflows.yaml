apiVersion: katalyst.taxonomy.plugins.cicd/v1alpha
kind: WorkflowTemplate
metadata:
  name: gha-dev
spec:
  description: GitHub Actions workflow for dev validation and deploys.
  parameters:
    service:
      description: Target service identifier.
      type: string
      required: true
    image_tag:
      description: Container tag to deploy.
      type: string
      required: true
  template:
    path: templates/gha-dev.yml.j2
    renderer:
      type: jinja
      strictUndefined: true
  jobs:
    - name: build-test-dev
      templateRef: gha-app-docker-layer-ci
      with:
        environment: dev
        deploy: true
---
apiVersion: katalyst.taxonomy.plugins.cicd/v1alpha
