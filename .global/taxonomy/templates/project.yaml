apiVersion: katalyst.taxonomy/v1alpha
kind: TaxonomyNode
metadata:
  name: "{{ name }}"
taxonomyNodeType: project
spec:
  description: "{{ description }}"
  owners:
    - "{{ primary_owner }}"
  parents:
    node: "{{ parent }}"
  environments:
    - "{{ primary_environment }}"
  project:
    status: active
